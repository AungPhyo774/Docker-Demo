services:

  server1:
    build: ./server1
    container_name: server1
    ports:
      - "8081:80"

  server2:
    build: ./server2
    container_name: server2
    ports:
      - "8082:80"

  nginx:
    build: ./nginx
    container_name: load-balancer
    ports:
      - "8080:80"
    depends_on:
      - server1
      - server2