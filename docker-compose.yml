services:

  nginx:
    image: nginx
    container_name: nginx-server
    ports:
      - "8080:80"

  mysql:
    image: mysql:8.0
    container_name: mysql-server
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: mydb

  ubuntu:
    image: ubuntu
    container_name: ubuntu-test
    command: tail -f /dev/null
    # compose မှာ CMC အစား command ကိုသုံးတာ‌