services:

  api:

    build: ./backend

    container_name: realContainer-api

    ports:
      - "3000:3000"

    depends_on:
      - db

  db:

    image: mysql:8.0

    container_name: realContainer-db

    restart: always

    environment:

      MYSQL_ROOT_PASSWORD: 123456

      MYSQL_DATABASE: realContainerDB

    ports:
      - "3306:3306"